version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/nestmatch"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    groups:
      all-non-major:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # On garde le contrôle manuel des majors (breaking changes potentiels)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
