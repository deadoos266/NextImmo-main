name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents sur même branche si un nouveau push arrive
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt-in Node.js 24 pour les actions (avant le switch auto du 2 juin 2026).
# Supprime le warning de deprecation "Node.js 20 actions are deprecated".
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Lint + Types + Tests + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nestmatch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: nestmatch/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Cache Next build
        uses: actions/cache@v5
        with:
          path: nestmatch/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('nestmatch/package-lock.json') }}-${{ hashFiles('nestmatch/**/*.[jt]s', 'nestmatch/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('nestmatch/package-lock.json') }}-

      - name: Build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}
        run: npm run build
