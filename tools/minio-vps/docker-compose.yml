# MinIO self-host pour KeyMatch — Phase 3 du plan migration OVH.
#
# Coexiste avec keymatch-postgres (Phase 2) et keymatch-fetcher (Phase 1)
# sur le même VPS-2 OVH (12 GB RAM, 100 GB NVMe).
#
# Volume persistant : /srv/keymatch/minio-data/ (à backup via tools/postgres-vps/scripts/backup-daily.sh)
#
# Usage local dev :
#   docker compose up -d
#   open http://localhost:9001  # console admin (login = MINIO_ROOT_USER/PASSWORD du .env)
#
# Usage VPS prod :
#   sudo mkdir -p /srv/keymatch/minio-data
#   sudo chown -R 1000:1000 /srv/keymatch/minio-data
#   cp .env.example .env  # remplir avec les vrais creds
#   docker compose up -d
#   ./scripts/init-buckets.sh  # crée les 7 buckets attendus
#   ./scripts/migrate-from-supabase.sh  # copie tout depuis Supabase Storage

services:
  minio:
    image: minio/minio:RELEASE.2026-04-15T00-00-00Z
    # ↑ on pin sur une release récente plutôt que :latest pour reproductibilité.
    # Liste : https://github.com/minio/minio/tags
    container_name: keymatch-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-keymatch}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # MINIO_BROWSER_REDIRECT_URL pour reverse proxy via Caddy
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:9000}
    command: server /data --console-address ":9001"
    volumes:
      - /srv/keymatch/minio-data:/data
    ports:
      # 9000 = API S3-compatible
      # 9001 = Console web admin
      # Bind localhost only : accessible depuis Next.js sur le même VPS + Caddy reverse proxy.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # MinIO recommande au moins 2 GB pour usage prod (cache + concurrency)
    mem_limit: 2g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true

  # mc (MinIO Client) one-shot pour init buckets au premier démarrage
  # Tourne 1 fois puis exit. Re-run sans risque (idempotent).
  minio-init:
    image: minio/mc:RELEASE.2026-04-15T00-00-00Z
    container_name: keymatch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-keymatch} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/avatars;
      mc mb --ignore-existing local/annonces-photos;
      mc mb --ignore-existing local/dossiers;
      mc mb --ignore-existing local/baux;
      mc mb --ignore-existing local/edl;
      mc mb --ignore-existing local/quittances;
      mc mb --ignore-existing local/messages-images;
      mc mb --ignore-existing local/bug-screenshots;
      mc anonymous set download local/avatars;
      mc anonymous set download local/annonces-photos;
      mc anonymous set none local/dossiers;
      mc anonymous set none local/baux;
      mc anonymous set none local/edl;
      mc anonymous set none local/quittances;
      mc anonymous set none local/messages-images;
      mc anonymous set none local/bug-screenshots;
      echo 'Buckets initialisés.';
      "
    networks:
      - default
    restart: "no"

networks:
  default:
    name: keymatch-minio-net
